name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java & Node
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          
      - name: Install & Configure Capacitor
        run: |
          npm install
          npm run build
          npx cap add android
          
          # 1. Inject Storage & Query Permissions
          sed -i '/<application/i \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" android:tools:ignore="ScopedStorage" />\n    <queries><package android:name="com.whatsapp" /><package android:name="com.android.email" /></queries>' android/app/src/main/AndroidManifest.xml
          
          # 2. Add the tools namespace
          sed -i 's/<manifest /<manifest xmlns:android="http:\/\/schemas.android.com\/apk\/res\/android" xmlns:tools="http:\/\/schemas.android.com\/tools" /' android/app/src/main/AndroidManifest.xml

          # 3. Add FileProvider (Required for Sharing PDFs)
          sed -i '/<\/application>/i \    <provider android:name="androidx.core.content.FileProvider" android:authorities="${applicationId}.fileprovider" android:exported="false" android:grantUriPermissions="true"><meta-data android:name="android.support.FILE_PROVIDER_PATHS" android:resource="@xml/file_paths" /></provider>' android/app/src/main/AndroidManifest.xml

          # 4. Create the file_paths.xml required by the Provider
          mkdir -p android/app/src/main/res/xml
          echo '<?xml version="1.0" encoding="utf-8"?><paths><external-path name="my_external_files" path="." /><cache-path name="my_cache_files" path="." /></paths>' > android/app/src/main/res/xml/file_paths.xml

          npx cap sync android

      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-bundle
          path: android/app/build/outputs/apk/debug/app-debug.apk
